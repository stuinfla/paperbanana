<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="system-ui, -apple-system, sans-serif">
  <title>Quality Score Progression Through Iterations</title>
  <desc>Line chart showing quality improvement from v1 (62) through v6 storytelling (93.5)</desc>

  <!-- Background -->
  <rect width="720" height="260" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Quality Progression: How We Got to 93.5</text>

  <!-- Chart area: 600x160, origin at (80, 45) -->
  <g transform="translate(80, 45)">
    <!-- Y-axis grid -->
    <line x1="0" y1="0" x2="580" y2="0" stroke="#f3f4f6"/>
    <text x="-8" y="4" text-anchor="end" font-size="9" fill="#9ca3af">100</text>

    <line x1="0" y1="40" x2="580" y2="40" stroke="#f3f4f6"/>
    <text x="-8" y="44" text-anchor="end" font-size="9" fill="#9ca3af">80</text>

    <line x1="0" y1="80" x2="580" y2="80" stroke="#f3f4f6"/>
    <text x="-8" y="84" text-anchor="end" font-size="9" fill="#9ca3af">60</text>

    <line x1="0" y1="120" x2="580" y2="120" stroke="#f3f4f6"/>
    <text x="-8" y="124" text-anchor="end" font-size="9" fill="#9ca3af">40</text>

    <line x1="0" y1="160" x2="580" y2="160" stroke="#4b5563"/>
    <text x="-8" y="164" text-anchor="end" font-size="9" fill="#9ca3af">0</text>

    <!-- Data points: score maps to y = 160 - (score/100 * 160) -->
    <!-- v1: 62 -> y=60.8, x=20 -->
    <!-- v2: 76 -> y=38.4, x=116 -->
    <!-- v3: 81 -> y=30.4, x=212 -->
    <!-- v4: 87 -> y=20.8, x=308 -->
    <!-- v5: 86 -> y=22.4, x=404 -->
    <!-- v6: 93.5 -> y=10.4, x=540 -->

    <!-- Connecting line (gray for standard, purple for storytelling) -->
    <polyline points="20,60.8 116,38.4 212,30.4 308,20.8 404,22.4" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <line x1="404" y1="22.4" x2="540" y2="10.4" stroke="#6366f1" stroke-width="3"/>

    <!-- Shaded area under storytelling jump -->
    <polygon points="404,22.4 540,10.4 540,160 404,160" fill="#6366f1" opacity="0.06"/>

    <!-- Data points -->
    <circle cx="20" cy="60.8" r="5" fill="#9ca3af"/>
    <circle cx="116" cy="38.4" r="5" fill="#9ca3af"/>
    <circle cx="212" cy="30.4" r="5" fill="#9ca3af"/>
    <circle cx="308" cy="20.8" r="5" fill="#9ca3af"/>
    <circle cx="404" cy="22.4" r="5" fill="#9ca3af"/>
    <circle cx="540" cy="10.4" r="8" fill="#6366f1" stroke="white" stroke-width="2"/>

    <!-- Score labels -->
    <text x="20" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">62</text>
    <text x="116" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">76</text>
    <text x="212" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">81</text>
    <text x="308" y="13" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">87</text>
    <text x="404" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">86</text>
    <text x="540" y="-2" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">93.5</text>

    <!-- Version labels -->
    <text x="20" y="178" text-anchor="middle" font-size="8" fill="#6b7280">v1</text>
    <text x="20" y="190" text-anchor="middle" font-size="7" fill="#9ca3af">Vanilla</text>

    <text x="116" y="178" text-anchor="middle" font-size="8" fill="#6b7280">v2</text>
    <text x="116" y="190" text-anchor="middle" font-size="7" fill="#9ca3af">Prompts</text>

    <text x="212" y="178" text-anchor="middle" font-size="8" fill="#6b7280">v3</text>
    <text x="212" y="190" text-anchor="middle" font-size="7" fill="#9ca3af">Tag fix</text>

    <text x="308" y="178" text-anchor="middle" font-size="8" fill="#6b7280">v4</text>
    <text x="308" y="190" text-anchor="middle" font-size="7" fill="#9ca3af">Retrieval</text>

    <text x="404" y="178" text-anchor="middle" font-size="8" fill="#6b7280">v5</text>
    <text x="404" y="190" text-anchor="middle" font-size="7" fill="#9ca3af">Critic</text>

    <text x="540" y="178" text-anchor="middle" font-size="9" font-weight="600" fill="#4f46e5">v6</text>
    <text x="540" y="190" text-anchor="middle" font-size="8" font-weight="600" fill="#6366f1">Storytelling</text>

    <!-- Annotation: breakthrough arrow -->
    <path d="M 460 40 C 470 30, 510 20, 530 16" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#purplearrow)"/>
    <text x="440" y="56" font-size="9" fill="#6366f1" font-weight="500">Visual metaphor</text>
    <text x="440" y="68" font-size="9" fill="#6366f1" font-weight="500">discovery</text>
  </g>

  <defs>
    <marker id="purplearrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>
</svg>
