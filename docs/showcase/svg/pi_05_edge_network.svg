<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" style="background-color: #0B1426; font-family: system-ui, -apple-system, sans-serif;">
  
  <defs>
    <!-- Gradients -->
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
    <linearGradient id="relayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <linearGradient id="ruvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#3B82F6" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#10B981" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#A855F7" />
    </marker>
  </defs>

  <!-- BACKGROUND GRID / RINGS -->
  <g id="rings" transform="translate(600, 320)">
    <!-- Browser Ring -->
    <circle cx="0" cy="0" r="260" fill="none" stroke="#1E293B" stroke-width="2" stroke-dasharray="6 6" />
    <!-- Relay Ring -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#1E293B" stroke-width="2" stroke-dasharray="6 6" />
    <!-- Core Ring -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#334155" stroke-width="1" />
  </g>

  <!-- DATA FLOW ARROWS -->
  <g id="connections">
    <!-- Core to Relay (-90 deg) -->
    <line x1="600" y1="245" x2="600" y2="210" stroke="#A855F7" stroke-width="3" marker-end="url(#arrowPurple)" stroke-dasharray="4 2"/>
    <text x="610" y="232" fill="#C084FC" font-size="12" font-weight="bold">State</text>
    
    <!-- Relay to Core (30 deg) -->
    <line x1="700" y1="377" x2="670" y2="360" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowBlue)" stroke-dasharray="4 2"/>
    <text x="695" y="395" fill="#60A5FA" font-size="12" font-weight="bold">Sync</text>

    <!-- Relay to Browser (-60 deg area) -->
    <line x1="635" y1="160" x2="785" y2="180" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowBlue)" stroke-dasharray="4 2"/>
    <text x="710" y="155" fill="#60A5FA" font-size="12" font-weight="bold">WASM Tasks</text>

    <!-- Browser to Relay (0 deg area) -->
    <line x1="820" y1="320" x2="770" y2="360" stroke="#10B981" stroke-width="3" marker-end="url(#arrowGreen)" stroke-dasharray="4 2"/>
    <text x="810" y="355" fill="#34D399" font-size="12" font-weight="bold">Results</text>

    <!-- Browser to Relay (120 deg area) -->
    <line x1="390" y1="440" x2="440" y2="420" stroke="#10B981" stroke-width="3" marker-end="url(#arrowGreen)" stroke-dasharray="4 2"/>
    <text x="415" y="455" fill="#34D399" font-size="12" font-weight="bold" text-anchor="middle">Data</text>
  </g>

  <!-- TIER 3: BROWSER NODES (Outer Ring) -->
  <g id="browsers">
    <!-- Node 1: -120 deg (375, 190) -->
    <g transform="translate(375, 190)">
      <circle cx="0" cy="0" r="32" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Browser Icon -->
      <rect x="-14" y="-10" width="28" height="20" rx="3" fill="none" stroke="#10B981" stroke-width="2"/>
      <line x1="-14" y1="-3" x2="14" y2="-3" stroke="#10B981" stroke-width="2"/>
      <circle cx="-9" cy="-6.5" r="1.5" fill="#10B981"/>
      <!-- Label -->
      <text x="-45" y="-5" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="end">Embedding Gen</text>
      <text x="-45" y="15" fill="#94A3B8" font-size="12" text-anchor="end">Vectorizes content</text>
    </g>

    <!-- Node 2: -60 deg (825, 190) -->
    <g transform="translate(825, 190)">
      <circle cx="0" cy="0" r="32" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Laptop Icon -->
      <rect x="-16" y="-10" width="32" height="18" rx="2" fill="none" stroke="#10B981" stroke-width="2"/>
      <path d="M-20,12 L20,12" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
      <!-- Label -->
      <text x="45" y="-5" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="start">WASM Inference</text>
      <text x="45" y="15" fill="#94A3B8" font-size="12" text-anchor="start">Edge AI execution</text>
      <!-- Metric Badge -->
      <rect x="45" y="30" width="90" height="22" rx="11" fill="#064E3B"/>
      <text x="90" y="45" fill="#34D399" font-size="12" font-weight="bold" text-anchor="middle">46 Heads</text>
    </g>

    <!-- Node 3: 0 deg (860, 320) -->
    <g transform="translate(860, 320)">
      <circle cx="0" cy="0" r="32" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Phone Icon -->
      <rect x="-10" y="-16" width="20" height="32" rx="4" fill="none" stroke="#10B981" stroke-width="2"/>
      <circle cx="0" cy="10" r="2" fill="#10B981"/>
      <!-- Label -->
      <text x="45" y="-5" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="start">Local Search</text>
      <text x="45" y="15" fill="#94A3B8" font-size="12" text-anchor="start">Private query routing</text>
    </g>

    <!-- Node 4: 60 deg (825, 450) -->
    <g transform="translate(825, 450)">
      <circle cx="0" cy="0" r="32" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Browser Icon -->
      <rect x="-14" y="-10" width="28" height="20" rx="3" fill="none" stroke="#10B981" stroke-width="2"/>
      <line x1="-14" y1="-3" x2="14" y2="-3" stroke="#10B981" stroke-width="2"/>
      <circle cx="-9" cy="-6.5" r="1.5" fill="#10B981"/>
      <!-- Label -->
      <text x="45" y="-5" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="start">LoRA Training</text>
      <text x="45" y="15" fill="#94A3B8" font-size="12" text-anchor="start">Federated learning</text>
    </g>

    <!-- Node 5: 120 deg (375, 450) -->
    <g transform="translate(375, 450)">
      <circle cx="0" cy="0" r="32" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Laptop Icon -->
      <rect x="-16" y="-10" width="32" height="18" rx="2" fill="none" stroke="#10B981" stroke-width="2"/>
      <path d="M-20,12 L20,12" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
      <!-- Label -->
      <text x="-45" y="-5" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="end">Knowledge Sync</text>
      <text x="-45" y="15" fill="#94A3B8" font-size="12" text-anchor="end">P2P graph updates</text>
    </g>

    <!-- Node 6: 180 deg (340, 320) -->
    <g transform="translate(340, 320)">
      <circle cx="0" cy="0" r="32" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Phone Icon -->
      <rect x="-10" y="-16" width="20" height="32" rx="4" fill="none" stroke="#10B981" stroke-width="2"/>
      <circle cx="0" cy="10" r="2" fill="#10B981"/>
      <!-- Label -->
      <text x="-45" y="-5" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="end">WASM Compute</text>
      <text x="-45" y="15" fill="#94A3B8" font-size="12" text-anchor="end">General edge tasks</text>
    </g>
  </g>

  <!-- TIER 2: RELAY NODES (Middle Ring) -->
  <g id="relays">
    <!-- Node 1: -90 deg (600, 170) -->
    <g transform="translate(600, 170)">
      <circle cx="0" cy="0" r="28" fill="#0F172A" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Antenna Icon -->
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="-10" r="3" fill="#3B82F6"/>
      <path d="M-8,-2 A 12,12 0 0,1 8,-2" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <path d="M-14,4 A 20,20 0 0,1 14,4" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <!-- Label -->
      <text x="0" y="-45" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="middle">Load Balancing</text>
      <text x="0" y="-25" fill="#94A3B8" font-size="12" text-anchor="middle">Traffic routing</text>
    </g>

    <!-- Node 2: 30 deg (730, 395) -->
    <g transform="translate(730, 395)">
      <circle cx="0" cy="0" r="28" fill="#0F172A" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Antenna Icon -->
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="-10" r="3" fill="#3B82F6"/>
      <path d="M-8,-2 A 12,12 0 0,1 8,-2" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <path d="M-14,4 A 20,20 0 0,1 14,4" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <!-- Label -->
      <text x="40" y="0" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="start">WebSocket Routing</text>
      <text x="40" y="20" fill="#94A3B8" font-size="12" text-anchor="start">Persistent connections</text>
      <!-- Metric Badge -->
      <rect x="40" y="35" width="90" height="22" rx="11" fill="#1E3A8A"/>
      <text x="85" y="50" fill="#60A5FA" font-size="12" font-weight="bold" text-anchor="middle">23x Faster</text>
    </g>

    <!-- Node 3: 150 deg (470, 395) -->
    <g transform="translate(470, 395)">
      <circle cx="0" cy="0" r="28" fill="#0F172A" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)"/>
      <!-- Antenna Icon -->
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="-10" r="3" fill="#3B82F6"/>
      <path d="M-8,-2 A 12,12 0 0,1 8,-2" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <path d="M-14,4 A 20,20 0 0,1 14,4" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <!-- Label -->
      <text x="-40" y="-15" fill="#F8FAFC" font-size="16" font-weight="bold" text-anchor="end">Presence</text>
      <text x="-40" y="5" fill="#94A3B8" font-size="12" text-anchor="end">Node discovery</text>
    </g>
  </g>

  <!-- TIER 1: PI CORE (Center) -->
  <g id="core" transform="translate(600, 320)">
    <circle cx="0" cy="0" r="75" fill="url(#coreGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#E879F9" stroke-width="2"/>
    
    <!-- Database / Brain Icon -->
    <g transform="translate(0, -15)">
      <ellipse cx="0" cy="-12" rx="22" ry="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      <path d="M-22,-12 L-22,12 A22,8 0 0,0 22,12 L22,-12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      <path d="M-22,0 A22,8 0 0,0 22,0" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      <!-- Brain Nodes -->
      <circle cx="-10" cy="5" r="3" fill="#FFFFFF"/>
      <circle cx="10" cy="5" r="3" fill="#FFFFFF"/>
      <circle cx="0" cy="15" r="3" fill="#FFFFFF"/>
      <line x1="-10" y1="5" x2="0" y2="15" stroke="#FFFFFF" stroke-width="1.5"/>
      <line x1="10" y1="5" x2="0" y2="15" stroke="#FFFFFF" stroke-width="1.5"/>
      <line x1="-10" y1="5" x2="10" y2="5" stroke="#FFFFFF" stroke-width="1.5"/>
    </g>

    <!-- Label -->
    <text x="0" y="30" fill="#FFFFFF" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="1">PI CORE</text>
    <text x="0" y="50" fill="#FBCFE8" font-size="12" text-anchor="middle">Knowledge &amp; Ledger</text>
    
    <!-- Metric -->
    <rect x="-40" y="65" width="80" height="20" rx="10" fill="#4C1D95"/>
    <text x="0" y="79" fill="#E879F9" font-size="12" font-weight="bold" text-anchor="middle">87% Auto</text>
  </g>

  <!-- ECONOMICS PANEL (Bottom) -->
  <g id="economics">
    <!-- Panel Background -->
    <rect x="50" y="640" width="1100" height="130" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>
    
    <!-- Title Left / Right -->
    <text x="300" y="675" fill="#10B981" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="2">EARN rUv</text>
    <text x="900" y="675" fill="#F97316" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="2">SPEND rUv</text>

    <!-- Earn Badges (Left) -->
    <!-- Row 1 -->
    <g transform="translate(100, 695)">
      <rect x="0" y="0" width="160" height="32" rx="16" fill="#064E3B" stroke="#10B981"/>
      <text x="80" y="21" fill="#34D399" font-size="14" font-weight="bold" text-anchor="middle">+20 WASM Compute</text>
    </g>
    <g transform="translate(280, 695)">
      <rect x="0" y="0" width="150" height="32" rx="16" fill="#064E3B" stroke="#10B981"/>
      <text x="75" y="21" fill="#34D399" font-size="14" font-weight="bold" text-anchor="middle">+10 LoRA Training</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(140, 735)">
      <rect x="0" y="0" width="150" height="32" rx="16" fill="#064E3B" stroke="#10B981"/>
      <text x="75" y="21" fill="#34D399" font-size="14" font-weight="bold" text-anchor="middle">+5 Knowledge Share</text>
    </g>
    <g transform="translate(310, 735)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="#064E3B" stroke="#10B981"/>
      <text x="50" y="21" fill="#34D399" font-size="14" font-weight="bold" text-anchor="middle">+1 Embed</text>
    </g>
    <g transform="translate(430, 735)">
      <rect x="0" y="0" width="90" height="32" rx="16" fill="#064E3B" stroke="#10B981"/>
      <text x="45" y="21" fill="#34D399" font-size="14" font-weight="bold" text-anchor="middle">+0.1 Vote</text>
    </g>

    <!-- Spend Badges (Right) -->
    <g transform="translate(800, 705)">
      <rect x="0" y="0" width="200" height="40" rx="20" fill="#7C2D12" stroke="#F97316"/>
      <text x="100" y="26" fill="#FDBA74" font-size="16" font-weight="bold" text-anchor="middle">-0.5 Network Search</text>
    </g>

    <!-- Connecting Tracks -->
    <path d="M555,705 L480,705" stroke="#10B981" stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M645,705 L760,705" stroke="#F97316" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- Central rUv Token -->
    <g transform="translate(600, 705)">
      <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" fill="url(#ruvGrad)" stroke="#FEF3C7" stroke-width="3" filter="url(#glow)"/>
      <text x="0" y="7" fill="#FFFFFF" font-size="22" font-weight="bold" text-anchor="middle">rUv</text>
    </g>
  </g>

  <!-- UI OVERLAY (Insight & Legend) -->
  <g id="ui-overlay">
    <!-- Core Insight Callout (Top Left) -->
    <rect x="40" y="40" width="400" height="85" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)"/>
    <text x="60" y="70" fill="#F8FAFC" font-size="18" font-weight="bold">Pi's Edge Network</text>
    <text x="60" y="95" fill="#94A3B8" font-size="14">Edge browsers form a decentralized supercomputer,</text>
    <text x="60" y="115" fill="#94A3B8" font-size="14">executing WebAssembly tasks to earn rUv tokens.</text>

    <!-- Network Tiers Legend (Top Right) -->
    <rect x="850" y="40" width="310" height="115" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <text x="870" y="70" fill="#F8FAFC" font-size="16" font-weight="bold">Network Topology</text>
    
    <circle cx="878" cy="90" r="6" fill="#10B981"/>
    <text x="895" y="95" fill="#94A3B8" font-size="14">Tier 3: Browser Nodes (Edge WASM)</text>
    
    <circle cx="878" cy="115" r="6" fill="#3B82F6"/>
    <text x="895" y="120" fill="#94A3B8" font-size="14">Tier 2: Relay Nodes (Routing)</text>
    
    <circle cx="878" cy="140" r="6" fill="#A855F7"/>
    <text x="895" y="145" fill="#94A3B8" font-size="14">Tier 1: Pi Core (Consensus)</text>
  </g>

</svg>