<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Background & Glass Filters -->
    <filter id="ambient-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" result="blur" />
    </filter>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Card Background Gradients -->
    <linearGradient id="bg-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.01" />
    </linearGradient>
    <linearGradient id="bg-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.01" />
    </linearGradient>
    <linearGradient id="bg-amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.01" />
    </linearGradient>

    <!-- Card Border Gradients -->
    <linearGradient id="stroke-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="stroke-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="stroke-amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.1" />
    </linearGradient>

    <!-- Radar Chart Reusable Grid -->
    <g id="radar-grid">
      <!-- Outer Pentagon -->
      <polygon points="0,-75 71,-23 44,61 -44,61 -71,-23" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <!-- Mid Pentagon -->
      <polygon points="0,-50 47,-15 29,40 -29,40 -47,-15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <!-- Inner Pentagon -->
      <polygon points="0,-25 24,-8 15,20 -15,20 -24,-8" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <!-- Axes -->
      <line x1="0" y1="0" x2="0" y2="-75" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <line x1="0" y1="0" x2="71" y2="-23" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <line x1="0" y1="0" x2="44" y2="61" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <line x1="0" y1="0" x2="-44" y2="61" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <line x1="0" y1="0" x2="-71" y2="-23" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </g>
  </defs>

  <!-- Deep Navy Background -->
  <rect width="1200" height="800" fill="#0B1426" />

  <!-- Ambient Background Glows -->
  <circle cx="240" cy="400" r="180" fill="#3B82F6" opacity="0.15" filter="url(#ambient-glow)" />
  <circle cx="600" cy="400" r="180" fill="#8B5CF6" opacity="0.15" filter="url(#ambient-glow)" />
  <circle cx="960" cy="400" r="180" fill="#F59E0B" opacity="0.12" filter="url(#ambient-glow)" />

  <!-- ==========================================
       CARD 1: THE ANALYST
       ========================================== -->
  <g transform="translate(80, 100)">
    <!-- Glass Panel -->
    <rect width="320" height="600" rx="20" fill="url(#bg-blue)" stroke="url(#stroke-blue)" stroke-width="2" filter="url(#drop-shadow)" />
    
    <!-- Top Right ID Badge -->
    <rect x="235" y="20" width="65" height="20" rx="10" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1" />
    <text x="267" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#93C5FD" letter-spacing="1">ANL-01</text>

    <!-- Avatar Section -->
    <g transform="translate(160, 110)">
      <circle r="45" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1" />
      <!-- Robot Face -->
      <rect x="-18" y="-15" width="36" height="30" rx="8" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2" />
      <circle cx="-7" cy="-2" r="2.5" fill="#93C5FD" />
      <circle cx="7" cy="-2" r="2.5" fill="#93C5FD" />
      <path d="M -5 7 Q 0 10 5 7" fill="none" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" />
      <!-- Antenna -->
      <line x1="0" y1="-15" x2="0" y2="-24" stroke="#3B82F6" stroke-width="2" />
      <circle cx="0" cy="-26" r="3" fill="#60A5FA" />
      <!-- Magnifying Glass Accessory -->
      <circle cx="22" cy="12" r="8" fill="rgba(11,20,38,0.8)" stroke="#60A5FA" stroke-width="2" />
      <line x1="28" y1="18" x2="36" y2="26" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Title & Divider -->
    <text x="160" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="2">DATA AGENT</text>
    <text x="160" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" letter-spacing="1">ANALYTICS &amp; SEARCH</text>
    <line x1="40" y1="260" x2="280" y2="260" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

    <!-- Radar Chart: Analyst (High Logic/Math/Search) -->
    <g transform="translate(160, 380)">
      <use href="#radar-grid" />
      <!-- Skill Polygon -->
      <polygon points="0,-70 65,-15 20,20 -15,10 -60,-10" fill="rgba(59,130,246,0.35)" stroke="#60A5FA" stroke-width="2" filter="url(#neon-glow)" />
      <circle cx="0" cy="-70" r="3" fill="#FFFFFF" />
      <circle cx="65" cy="-15" r="3" fill="#FFFFFF" />
      <circle cx="20" cy="20" r="3" fill="#FFFFFF" />
      <circle cx="-15" cy="10" r="3" fill="#FFFFFF" />
      <circle cx="-60" cy="-10" r="3" fill="#FFFFFF" />
      
      <!-- Labels -->
      <text x="0" y="-85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Logic</text>
      <text x="80" y="-20" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Math</text>
      <text x="50" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Stats</text>
      <text x="-50" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Code</text>
      <text x="-80" y="-20" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Search</text>
    </g>

    <!-- Trust Score -->
    <g transform="translate(160, 530)">
      <circle r="36" fill="rgba(11,20,38,0.5)" stroke="rgba(255,255,255,0.05)" stroke-width="6" />
      <!-- 98% filled = 226.2 * 0.98 = 221.6 -->
      <circle r="36" fill="none" stroke="#3B82F6" stroke-width="6" stroke-dasharray="226.2" stroke-dashoffset="4.5" stroke-linecap="round" transform="rotate(-90)" filter="url(#neon-glow)" />
      <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">98%</text>
      <text x="0" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF" letter-spacing="1">TRUST SCORE</text>
    </g>
  </g>

  <!-- ==========================================
       CARD 2: THE CREATOR
       ========================================== -->
  <g transform="translate(440, 100)">
    <!-- Glass Panel -->
    <rect width="320" height="600" rx="20" fill="url(#bg-purple)" stroke="url(#stroke-purple)" stroke-width="2" filter="url(#drop-shadow)" />
    
    <!-- Top Right ID Badge -->
    <rect x="235" y="20" width="65" height="20" rx="10" fill="rgba(139,92,246,0.2)" stroke="#8B5CF6" stroke-width="1" />
    <text x="267" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#C4B5FD" letter-spacing="1">CRT-02</text>

    <!-- Avatar Section -->
    <g transform="translate(160, 110)">
      <circle r="45" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.3)" stroke-width="1" />
      <!-- Robot Face -->
      <circle cx="0" cy="-2" r="16" fill="#2E1065" stroke="#8B5CF6" stroke-width="2" />
      <path d="M -6 -5 Q -4 -8 -2 -5" fill="none" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 2 -5 Q 4 -8 6 -5" fill="none" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round" />
      <!-- Lightbulb Accessory -->
      <path d="M 18 -18 C 18 -24 26 -24 26 -18 C 26 -14 24 -12 24 -10 L 20 -10 C 20 -12 18 -14 18 -18 Z" fill="rgba(11,20,38,0.8)" stroke="#A78BFA" stroke-width="1.5" />
      <rect x="20" y="-10" width="4" height="4" fill="#A78BFA" />
      <!-- Glow rays -->
      <line x1="22" y1="-26" x2="22" y2="-29" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" />
      <line x1="14" y1="-20" x2="11" y2="-21" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" />
      <line x1="30" y1="-20" x2="33" y2="-21" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" />
    </g>

    <!-- Title & Divider -->
    <text x="160" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="2">CREATIVE AGENT</text>
    <text x="160" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" letter-spacing="1">IDEATION &amp; DESIGN</text>
    <line x1="40" y1="260" x2="280" y2="260" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

    <!-- Radar Chart: Creator (High Art/Empathy/Ideas) -->
    <g transform="translate(160, 380)">
      <use href="#radar-grid" />
      <!-- Skill Polygon -->
      <polygon points="0,-60 25,-10 60,45 -55,50 -35,0" fill="rgba(139,92,246,0.35)" stroke="#A78BFA" stroke-width="2" filter="url(#neon-glow)" />
      <circle cx="0" cy="-60" r="3" fill="#FFFFFF" />
      <circle cx="25" cy="-10" r="3" fill="#FFFFFF" />
      <circle cx="60" cy="45" r="3" fill="#FFFFFF" />
      <circle cx="-55" cy="50" r="3" fill="#FFFFFF" />
      <circle cx="-35" cy="0" r="3" fill="#FFFFFF" />
      
      <!-- Labels -->
      <text x="0" y="-85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Ideas</text>
      <text x="80" y="-20" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Writing</text>
      <text x="50" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Art</text>
      <text x="-50" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Empathy</text>
      <text x="-80" y="-20" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Flow</text>
    </g>

    <!-- Trust Score -->
    <g transform="translate(160, 530)">
      <circle r="36" fill="rgba(11,20,38,0.5)" stroke="rgba(255,255,255,0.05)" stroke-width="6" />
      <!-- 90% filled = 226.2 * 0.90 = 203.6 -->
      <circle r="36" fill="none" stroke="#8B5CF6" stroke-width="6" stroke-dasharray="226.2" stroke-dashoffset="22.6" stroke-linecap="round" transform="rotate(-90)" filter="url(#neon-glow)" />
      <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">90%</text>
      <text x="0" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF" letter-spacing="1">TRUST SCORE</text>
    </g>
  </g>

  <!-- ==========================================
       CARD 3: THE ENGINEER
       ========================================== -->
  <g transform="translate(800, 100)">
    <!-- Glass Panel -->
    <rect width="320" height="600" rx="20" fill="url(#bg-amber)" stroke="url(#stroke-amber)" stroke-width="2" filter="url(#drop-shadow)" />
    
    <!-- Top Right ID Badge -->
    <rect x="235" y="20" width="65" height="20" rx="10" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1" />
    <text x="267" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FDE68A" letter-spacing="1">ENG-03</text>

    <!-- Avatar Section -->
    <g transform="translate(160, 110)">
      <circle r="45" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1" />
      <!-- Robot Face -->
      <path d="M -20 -12 L 20 -12 L 14 12 L -14 12 Z" fill="#78350F" stroke="#F59E0B" stroke-width="2" stroke-linejoin="round" />
      <rect x="-10" y="-4" width="6" height="4" rx="1" fill="#FDE68A" />
      <rect x="4" y="-4" width="6" height="4" rx="1" fill="#FDE68A" />
      <!-- Gear Accessory -->
      <circle cx="22" cy="12" r="7" fill="rgba(11,20,38,0.8)" stroke="#FCD34D" stroke-width="2" stroke-dasharray="3 2" />
      <circle cx="22" cy="12" r="2" fill="#FCD34D" />
    </g>

    <!-- Title & Divider -->
    <text x="160" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="2">CODE AGENT</text>
    <text x="160" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" letter-spacing="1">SYSTEMS &amp; SCALE</text>
    <line x1="40" y1="260" x2="280" y2="260" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

    <!-- Radar Chart: Engineer (Balanced, peaks bottom right) -->
    <g transform="translate(160, 380)">
      <use href="#radar-grid" />
      <!-- Skill Polygon -->
      <polygon points="0,-50 65,-15 70,55 -30,40 -50,-10" fill="rgba(245,158,11,0.35)" stroke="#FCD34D" stroke-width="2" filter="url(#neon-glow)" />
      <circle cx="0" cy="-50" r="3" fill="#FFFFFF" />
      <circle cx="65" cy="-15" r="3" fill="#FFFFFF" />
      <circle cx="70" cy="55" r="3" fill="#FFFFFF" />
      <circle cx="-30" cy="40" r="3" fill="#FFFFFF" />
      <circle cx="-50" cy="-10" r="3" fill="#FFFFFF" />
      
      <!-- Labels -->
      <text x="0" y="-85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">System</text>
      <text x="80" y="-20" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Speed</text>
      <text x="50" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Scale</text>
      <text x="-50" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Logic</text>
      <text x="-80" y="-20" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB">Python</text>
    </g>

    <!-- Trust Score -->
    <g transform="translate(160, 530)">
      <circle r="36" fill="rgba(11,20,38,0.5)" stroke="rgba(255,255,255,0.05)" stroke-width="6" />
      <!-- 95% filled = 226.2 * 0.95 = 214.9 -->
      <circle r="36" fill="none" stroke="#F59E0B" stroke-width="6" stroke-dasharray="226.2" stroke-dashoffset="11.3" stroke-linecap="round" transform="rotate(-90)" filter="url(#neon-glow)" />
      <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">95%</text>
      <text x="0" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF" letter-spacing="1">TRUST SCORE</text>
    </g>
  </g>

</svg>