<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="system-ui, -apple-system, sans-serif">
  <title>PaperBanana Enhanced Pipeline Flow</title>
  <desc>Pipeline: Content flows through Retriever, Planner (with metaphor discovery), Stylist (metaphor preservation), Visualizer (multi-candidate), and Critic (7 checks) with iterative refinement loop</desc>

  <!-- Background -->
  <rect width="800" height="200" fill="#fafbfc" rx="8"/>

  <!-- Input -->
  <g transform="translate(20, 65)">
    <rect width="90" height="70" fill="#f3f4f6" stroke="#d1d5db" rx="8"/>
    <text x="45" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Content</text>
    <text x="45" y="46" text-anchor="middle" font-size="9" fill="#6b7280">+ Caption</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 114 100 L 134 100" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Retriever -->
  <g transform="translate(138, 65)">
    <rect width="100" height="70" fill="#eff6ff" stroke="#93c5fd" rx="8"/>
    <text x="50" y="26" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Retriever</text>
    <text x="50" y="42" text-anchor="middle" font-size="8" fill="#3b82f6">Find reference</text>
    <text x="50" y="54" text-anchor="middle" font-size="8" fill="#3b82f6">examples</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 242 100 L 262 100" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Planner (highlighted - key change) -->
  <g transform="translate(266, 55)">
    <rect width="120" height="90" fill="#faf5ff" stroke="#a78bfa" stroke-width="2" rx="8"/>
    <rect x="20" y="-10" width="80" height="16" fill="#7c3aed" rx="8"/>
    <text x="60" y="2" text-anchor="middle" font-size="8" font-weight="600" fill="white">KEY CHANGE</text>
    <text x="60" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Planner</text>
    <text x="60" y="44" text-anchor="middle" font-size="8" fill="#7c3aed">"What is this LIKE?"</text>
    <text x="60" y="56" text-anchor="middle" font-size="8" fill="#7c3aed">Metaphor discovery</text>
    <text x="60" y="68" text-anchor="middle" font-size="8" fill="#7c3aed">before any boxes</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 390 100 L 410 100" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stylist -->
  <g transform="translate(414, 65)">
    <rect width="100" height="70" fill="#fdf4ff" stroke="#e879f9" rx="8"/>
    <text x="50" y="26" text-anchor="middle" font-size="11" font-weight="600" fill="#86198f">Stylist</text>
    <text x="50" y="42" text-anchor="middle" font-size="8" fill="#a855f7">Preserve metaphor</text>
    <text x="50" y="54" text-anchor="middle" font-size="8" fill="#a855f7">+ NeurIPS style</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M 518 100 L 538 100" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Visualizer -->
  <g transform="translate(542, 65)">
    <rect width="100" height="70" fill="#ecfdf5" stroke="#6ee7b7" rx="8"/>
    <text x="50" y="26" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Visualizer</text>
    <text x="50" y="42" text-anchor="middle" font-size="8" fill="#10b981">N candidates</text>
    <text x="50" y="54" text-anchor="middle" font-size="8" fill="#10b981">in parallel</text>
  </g>

  <!-- Arrow 5 -->
  <path d="M 646 100 L 666 100" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Critic -->
  <g transform="translate(670, 65)">
    <rect width="100" height="70" fill="#fef2f2" stroke="#fca5a5" rx="8"/>
    <text x="50" y="26" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Critic</text>
    <text x="50" y="42" text-anchor="middle" font-size="8" fill="#ef4444">7 quality checks</text>
    <text x="50" y="54" text-anchor="middle" font-size="8" fill="#ef4444">up to 3 rounds</text>
  </g>

  <!-- Refinement loop arrow (Critic -> Visualizer) -->
  <path d="M 720 139 L 720 168 L 592 168 L 592 139" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowred)"/>
  <text x="656" y="182" text-anchor="middle" font-size="8" fill="#ef4444">refine loop</text>

  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arrowred" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>
</svg>
